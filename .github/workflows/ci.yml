name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build & Check (Android / shared)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run shared tests
        run: ./gradlew :shared:allTests

      - name: Assemble Android debug
        run: ./gradlew :composeApp:assembleDebug

      - name: Android lint (debug)
        run: ./gradlew :composeApp:lintDebug

  build-ios-framework:
    name: Build & test iOS shared framework
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Link Debug framework (iosSimulatorArm64)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS shared tests (iosSimulatorArm64)
        run: ./gradlew :shared:iosSimulatorArm64Test

  build-ios-app:
    name: Build iOS app (Xcode)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Link Debug framework (iosSimulatorArm64)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iosApp with xcodebuild
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
